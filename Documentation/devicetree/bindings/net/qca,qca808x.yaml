%YAML 1.2
---
$id: http://devicetree.org/schemas/net/qca,qca808x.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm Atheros QCA808X PHY

maintainers:
  - Christian Marangi <ansuelsmth@gmail.com>

description:
  QCA808X PHYs can have up to 3 LEDs attached.
  All 3 LEDs are disabled by default.
  2 LEDs have dedicated pins with the 3rd LED having the
  double function of Interrupt LEDs/GPIO or additional LED.

  By default this special PIN is set to LED function.

allOf:
  - $ref: ethernet-phy.yaml#

properties:
  compatible:
    enum:
      - ethernet-phy-id004d.d101

  qca,led-mode:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: |
      Select one of the vendor-defined LED preset modes described in the
      datasheet. The selected mode programs the MMD7 LED control registers for
      all three PHY LED outputs during PHY initialization.
    enum:
      - 1
      - 2
      - 3

  wakeup-gpios:
    maxItems: 1
    description:
      GPIO connected to the active-low INTn_WOL output for Wake-on-LAN.

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>
    #include <dt-bindings/leds/common.h>

    mdio {
        #address-cells = <1>;
        #size-cells = <0>;

        ethernet-phy@0 {
            compatible = "ethernet-phy-id004d.d101";
            reg = <0>;
            qca,led-mode = <2>;
            wakeup-gpios = <&gpio 1 GPIO_ACTIVE_LOW>;

            leds {
                #address-cells = <1>;
                #size-cells = <0>;

                led@0 {
                    reg = <0>;
                    color = <LED_COLOR_ID_GREEN>;
                    function = LED_FUNCTION_WAN;
                    default-state = "keep";
                };
            };
        };
    };
